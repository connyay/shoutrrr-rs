version: 2
updates:
- package-ecosystem: cargo
  directory: "/"
  schedule:
    interval: daily
    time: "11:00"
  open-pull-requests-limit: 10
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  ignore:
    # Pinned to the crate's MSRV (Cargo.toml rust-version). Bumps must be
    # made deliberately alongside an MSRV change, not by dependabot.
    - dependency-name: "dtolnay/rust-toolchain"
